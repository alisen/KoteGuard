name: Release

on:
  push:
    tags:
      - "v*"   # triggers on v1.0.0a3, v1.0.0, etc.

permissions:
  contents: read

jobs:
  test:
    name: Verify tag & run tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Verify tag matches pyproject.toml version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match pyproject.toml version 'v${VERSION}'"
            exit 1
          fi

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q --tb=short

  release:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    environment: pypi         # matches the "pypi" environment in GitHub Settings → Environments
    permissions:
      contents: write          # needed to create a GitHub Release
      id-token: write          # needed for PyPI trusted publishing (no token required)

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses PyPI Trusted Publishing — no API token needed at all.
        # Set it up once at: pypi.org/manage/project/koteguard/settings/publishing/
        # Add publisher: owner=alisen, repo=KoteGuard, workflow=release.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true   # auto-generates notes from commits
