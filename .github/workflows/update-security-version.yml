name: Sync SECURITY.md version

on:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"   # only runs when the version (or any project metadata) changes

jobs:
  sync-version:
    name: Update Supported Versions table
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit and push the updated SECURITY.md

    steps:
      # Note: checkout uses the default GITHUB_TOKEN. Pushes made with it do
      # NOT trigger downstream workflows — that's intentional here ([skip ci]).
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Update SECURITY.md
        run: python .github/scripts/update_security_version.py

      - name: Commit updated SECURITY.md (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SECURITY.md
          # Only commit when there is actually something staged
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            VERSION=$(python -c "import re, sys; m=re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read()); print(m.group(1))")
            git commit -m "chore: sync SECURITY.md to v${VERSION} [skip ci]"
            # Guard against non-fast-forward on back-to-back pushes to main.
            # (Rebase must come after the commit — a dirty index blocks it.)
            git pull --rebase origin main
            git push
          fi
