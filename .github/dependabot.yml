version: 2
updates:
  # Python dependencies — grouped into one weekly PR
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    rebase-strategy: "auto"
    groups:
      python-deps:
        patterns: ["*"]   # all pip updates in one PR

  # GitHub Actions — grouped into one weekly PR
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    rebase-strategy: "auto"
    groups:
      github-actions:
        patterns: ["*"]   # all actions updates in one PR
